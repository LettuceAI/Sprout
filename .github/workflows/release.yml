name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset: sprout-linux-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: sprout-macos-aarch64.tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            asset: sprout-macos-x86_64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: sprout-windows-x86_64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: tar -C target/${{ matrix.target }}/release -czf ${{ matrix.asset }} sprout
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/${{ matrix.target }}/release/sprout.exe -DestinationPath ${{ matrix.asset }}
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          generate_release_notes: true
